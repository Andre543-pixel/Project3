<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <h1>Crypto Clicker Game</h1>

      <div class="stats">
        <p>Баланс: <span id="balance">0</span> BTC</p>
        <p>Сила кліку: <span id="click-power">1</span></p>
      </div>

      <div id="main-button" class="coin"></div>

      <div class="shop">
        <h3>Магазин покращень</h3>
        <button id="upgrade-btn">
          Купити відеокарту (Ціна: <span id="upgrade-cost">10</span>)
        </button>
      </div>
    </div>
  </body>
  <body>
    <script src="script.js"></script>
  </body>
</html>
